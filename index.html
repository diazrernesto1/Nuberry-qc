<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NuBerry QC Sample Sheet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: #fff; border-radius: 14px; border: 1px solid #e5e5e0; }
  .logo { width: 44px; height: 44px; border-radius: 10px; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .header p { font-size: 13px; color: #888; margin-top: 2px; }
  .card { background: #fff; border: 1px solid #e5e5e0; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; background: #fff; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
  .field-center input { text-align: center; }
  .defect-label { font-size: 11px; color: #888; margin-bottom: 4px; display: block; text-align: center; }
  .pallet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .pallet-badge { background: #f0f0ea; border: 1px solid #ddd; border-radius: 99px; padding: 3px 12px; font-size: 13px; font-weight: 500; color: #555; }
  .pct-bar { background: #f5f5f0; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin: 12px 0; }
  .pct-val { font-size: 22px; font-weight: 700; }
  .pct-label { font-size: 12px; color: #888; }
  .photo-zone { border: 2px dashed #ddd; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; position: relative; margin-top: 6px; transition: background 0.15s; }
  .photo-zone:hover { background: #f9f9f5; }
  .photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-zone .icon { font-size: 28px; margin-bottom: 4px; }
  .photo-zone p { font-size: 12px; color: #888; }
  .photo-previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .photo-thumb-wrap { position: relative; }
  .photo-thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; display: block; }
  .photo-rm { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #E24B4A; color: #fff; border-radius: 50%; border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; line-height: 1; }
  .btn-add-pallet { width: 100%; padding: 12px; border-radius: 10px; border: 2px dashed #ddd; background: transparent; color: #888; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 1rem; transition: all 0.15s; }
  .btn-add-pallet:hover { background: #f0f0ea; color: #444; }
  .btn-submit { width: 100%; padding: 14px; border-radius: 12px; background: #1D9E75; border: none; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
  .btn-submit:hover { background: #0F6E56; }
  .btn-submit:disabled { background: #ccc; cursor: default; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #bbb; padding: 4px 8px; border-radius: 6px; font-size: 18px; line-height: 1; }
  .btn-remove:hover { color: #E24B4A; background: #fff0f0; }
  .success { background: #EAF3DE; border: 1px solid #639922; border-radius: 12px; padding: 1.5rem; text-align: center; display: none; margin-top: 1rem; }
  .success .big-check { font-size: 36px; margin-bottom: 8px; }
  .success p { color: #3B6D11; font-weight: 500; }
  .section-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 8px; margin-top: 12px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
  textarea { resize: vertical; min-height: 52px; }
  .note-box { background: #fffbea; border: 1px solid #f0d060; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a5c00; margin-bottom: 1rem; line-height: 1.5; }
  @media (max-width: 480px) {
    .grid-3 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">🫐</div>
    <div>
      <h1>NuBerry QC Sample Sheet</h1>
      <p>Fresh Blueberry — Quality Control</p>
    </div>
  </div>
<div class="card">
    <div class="card-title">📋 Session Info</div>
    <div class="grid-3">
      <div class="field">
        <label>Date</label>
        <input type="date" id="sess-date" />
      </div>
      <div class="field">
        <label>Location</label>
        <select id="sess-loc">
          <option value="">Select location...</option>
          <option>SW Michigan</option>
          <option>New Jersey</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Inspector name</label>
        <input type="text" id="sess-inspector" placeholder="Your name" />
      </div>
    </div>
  </div>

  <div id="pallets-container"></div>

  <button class="btn-add-pallet" id="btn-add">+ Add pallet</button>

  <button class="btn-submit" id="btn-submit">🚀 Submit session to Google Sheets</button>

  <div class="success" id="success-msg">
    <div class="big-check">✅</div>
    <p id="success-text">Session submitted successfully!</p>
  </div>

  

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_5VoKO6TJRkwGm_-QiVLpxutdTDkECqds4m66j6bh8_EPrsoXvHrcgRWjZ0q3_Rjy/exec';
let palletCount = 0;
const photoData = {};

function calcPct(id) {
  const fields = ['green','red','stems','shriveled','overripe','leaky','mold'];
  let total = 0;
  fields.forEach(f => {
    total += parseInt(document.getElementById('p' + id + '-' + f)?.value) || 0;
  });
  const sz = parseInt(document.getElementById('p' + id + '-sz')?.value) || 100;
  const pct = sz > 0 ? ((total / sz) * 100).toFixed(1) : '0.0';
  const el = document.getElementById('p' + id + '-pct');
  if (el) {
    el.textContent = pct + '%';
    el.style.color = parseFloat(pct) > 5 ? '#E24B4A' : parseFloat(pct) > 2 ? '#BA7517' : '#1D9E75';
  }
}

function addPallet() {
  palletCount++;
  const id = palletCount;
  photoData[id] = [];
  const container = document.getElementById('pallets-container');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'pallet-' + id;
  card.innerHTML = `
    <div class="pallet-header">
      <span class="pallet-badge">📦 Pallet ${id}</span>
      <button class="btn-remove" onclick="removePallet(${id})" title="Remove">✕</button>
    </div>
    <div class="grid-2" style="margin-bottom:12px">
      <div class="field"><label>Pallet number</label><input type="text" id="p${id}-num" placeholder="e.g. 12634-01" /></div>
      <div class="field"><label>Variety</label><input type="text" id="p${id}-var" value="Pink" /></div>
      <div class="field"><label>Label</label><input type="text" id="p${id}-label" placeholder="e.g. Driscoll's" /></div>
      <div class="field"><label>Pack Size</label><input type="text" id="p${id}-packsize" placeholder="e.g. 18oz" /></div>
      <div class="field"><label>Sample #</label><select id="p${id}-smp"><option value="1">Sample 1</option><option value="2">Sample 2</option></select></div>
      <div class="field"><label>Sample size</label><input type="number" id="p${id}-sz" value="100" min="1" oninput="calcPct(${id})" /></div>
    </div>
    <span class="section-label">Defects</span>
    <div class="grid-4" style="margin-bottom:12px">
      <div class="field-center"><span class="defect-label">Green</span><input type="number" id="p${id}-green" value="0" min="0" oninput="calcPct(${id})" /></div>
      <div class="field-center"><span class="defect-label">Red/Rojo</span><input type="number" id="p${id}-red" value="0" min="0" oninput="calcPct(${id})" /></div>
      <div class="field-center"><span class="defect-label">Stems</span><input type="number" id="p${id}-stems" value="0" min="0" oninput="calcPct(${id})" /></div>
      <div class="field-center"><span class="defect-label">Shriveled</span><input type="number" id="p${id}-shriveled" value="0" min="0" oninput="calcPct(${id})" /></div>
      <div class="field-center"><span class="defect-label">Overripe</span><input type="number" id="p${id}-overripe" value="0" min="0" oninput="calcPct(${id})" /></div>
      <div class="field-center"><span class="defect-label">Leaky</span><input type="number" id="p${id}-leaky" value="0" min="0" oninput="calcPct(${id})" /></div>
      <div class="field-center"><span class="defect-label">Mold</span><input type="number" id="p${id}-mold" value="0" min="0" oninput="calcPct(${id})" /></div>
    </div>
    <div class="pct-bar">
      <span class="pct-val" id="p${id}-pct" style="color:#1D9E75">0.0%</span>
      <span class="pct-label">defect rate</span>
    </div>
    <div class="field"><label>Notes</label><textarea id="p${id}-notes" placeholder="Optional notes about this pallet..."></textarea></div>
    <span class="section-label" style="margin-top:12px">Photos — fruit condition</span>
    <div class="photo-zone">
      <input type="file" accept="image/*" multiple capture="environment" onchange="handlePhotos(${id}, this)" />
      <div class="icon">📷</div>
      <p>Tap to add photos or use camera</p>
    </div>
    <div class="photo-previews" id="p${id}-previews"></div>
  `;
  container.appendChild(card);
}

function removePallet(id) {
  const c = document.getElementById('pallet-' + id);
  if (c) c.remove();
  delete photoData[id];
}

function handlePhotos(id, input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photoData[id] = photoData[id] || [];
      const dataUrl = e.target.result;
      const idx = photoData[id].length;
      photoData[id].push(dataUrl);
      const prev = document.getElementById('p' + id + '-previews');
      const wrap = document.createElement('div');
      wrap.className = 'photo-thumb-wrap';
      const img = document.createElement('img');
      img.src = dataUrl;
      img.className = 'photo-thumb';
      img.alt = 'Fruit condition photo';
      const rm = document.createElement('button');
      rm.className = 'photo-rm';
      rm.textContent = '×';
      rm.title = 'Remove photo';
      rm.onclick = () => { photoData[id].splice(idx, 1); wrap.remove(); };
      wrap.appendChild(img);
      wrap.appendChild(rm);
      prev.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('btn-add').onclick = addPallet;

document.getElementById('btn-submit').onclick = async () => {
  const date = document.getElementById('sess-date').value;
  const loc = document.getElementById('sess-loc').value;
  const inspector = document.getElementById('sess-inspector').value;

  if (!date || !loc || !inspector) {
    alert('Please complete all session info fields before submitting.');
    return;
  }

  const cards = document.querySelectorAll('[id^="pallet-"]');
  if (!cards.length) {
    alert('Please add at least one pallet.');
    return;
  }

  const rows = [];
  let valid = true;
  cards.forEach(card => {
    const id = card.id.replace('pallet-', '');
    const palletNum = document.getElementById('p' + id + '-num')?.value || '';
    if (!palletNum) { alert('Please enter a pallet number for each pallet.'); valid = false; return; }
    const fields = ['green','red','stems','shriveled','overripe','leaky','mold'];
    let total = 0;
    const defects = {};
    fields.forEach(f => {
      const v = parseInt(document.getElementById('p' + id + '-' + f)?.value) || 0;
      defects[f] = v;
      total += v;
    });
    const sz = parseInt(document.getElementById('p' + id + '-sz')?.value) || 100;
    rows.push({
      date, location: loc, inspector,
      palletNum,
      variety: document.getElementById('p' + id + '-var')?.value || '',
      label: document.getElementById('p' + id + '-label')?.value || '',
      packSize: document.getElementById('p' + id + '-packsize')?.value || '',
      sampleNum: document.getElementById('p' + id + '-smp')?.value || '',
      sampleSize: sz,
      ...defects,
      pct: ((total / sz) * 100).toFixed(1) + '%',
      notes: document.getElementById('p' + id + '-notes')?.value || '',
      photoCount: (photoData[id] || []).length
    });
  });

  if (!valid) return;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Submitting...';

  try {
    const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ rows }),
        headers: { 'Content-Type': 'text/plain' }
      });
      console.log('Submitted');
    document.getElementById('success-msg').style.display = 'block';
    document.getElementById('success-text').textContent =
      rows.length + ' pallet' + (rows.length > 1 ? 's' : '') + ' submitted successfully on ' + date + ' from ' + loc + '!';
  } catch(err) {
    alert('Submission failed — check your internet connection or setup steps.');
  }

  btn.disabled = false;
  btn.textContent = '🚀 Submit session to Google Sheets';
};

document.getElementById('sess-date').value = new Date().toISOString().split('T')[0];
addPallet();
</script>
</body>
</html>
